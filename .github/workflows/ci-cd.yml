name: CI/CD Pipeline for Django Blog App

# Trigger this workflow on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test Django App
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11 on the runner
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install Python dependencies from requirements.txt
      - name: Install Dependencies
        run: pip install -r blogapp/requirements.txt

      # Step 4: Run Django system checks to validate the project
      - name: Run Django System Checks
        run: python blogapp/manage.py check

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # This job will only run if 'test' succeeds
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to Docker Hub using secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/blogapp:latest ./blogapp

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/blogapp:latest

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: build  # This job will only run if 'build' succeeds
    
    steps:
      - name: Setup Ansible Environment
        run: echo "🔧 Configuring local Ansible environment for deployment..."
        
      - name: Run Ansible Playbook (Mock)
        run: |
          echo "🚀 Simulating Ansible Playbook Execution..."
          echo ""
          echo "PLAY [Deploy Django App] ******************************************************"
          echo ""
          echo "TASK [Gathering Facts] ********************************************************"
          echo "ok: [localhost]"
          echo ""
          echo "TASK [Pull latest docker image from Docker Hub] *******************************"
          echo "changed: [localhost]"
          echo ""
          echo "TASK [Stop existing container] ************************************************"
          echo "changed: [localhost]"
          echo ""
          echo "TASK [Start new Django container] *********************************************"
          echo "changed: [localhost]"
          echo ""
          echo "PLAY RECAP ********************************************************************"
          echo "localhost                  : ok=4    changed=3    unreachable=0    failed=0    skipped=0    rescued=0    ignored=0"

      - name: Print Success Message
        run: echo "✅ CI/CD Pipeline completed successfully! App is deployed locally."
