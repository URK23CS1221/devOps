# ansible/deploy.yml
---
- name: Deploy BlogApp to Minikube
  hosts: localhost
  connection: local
  vars:
    project_dir: "k8s"   # relative path, no spaces issue!
    image_name: "blogapp:latest"
    service_name: "blogapp-service"
    app_port: 8000

  tasks:

    - name: Start Minikube
      command: minikube start
      changed_when: false

    - name: Load Docker image into Minikube
      command: minikube image load {{ image_name }}
      changed_when: true

    - name: Apply deployment
      shell: kubectl apply -f "k8s/deployment.yaml"
      args:
        chdir: "/mnt/c/Users/DHARSHAN POWER/Desktop/devOPs/devOps"
      register: deploy_out
      changed_when: "'created' in deploy_out.stdout or 'configured' in deploy_out.stdout"

    - name: Apply service
      shell: kubectl apply -f "k8s/service.yaml"
      args:
        chdir: "/mnt/c/Users/DHARSHAN POWER/Desktop/devOPs/devOps"
      register: service_out
      changed_when: "'created' in service_out.stdout or 'configured' in service_out.stdout"

    - name: Wait for pods to be Running
      command: kubectl get pods --field-selector=status.phase=Running
      register: pods
      retries: 15
      delay: 8
      until: pods.rc == 0 and pods.stdout != ""

    - name: Show pod status
      command: kubectl get pods
      register: pod_status
    - debug:
        msg: "{{ pod_status.stdout_lines }}"

    - name: Show service status
      command: kubectl get services
      register: svc_status
    - debug:
        msg: "{{ svc_status.stdout_lines }}"

    - name: Port-forward in background
      shell: |
        nohup kubectl port-forward service/{{ service_name }} {{ app_port }}:{{ app_port }} \
        > /tmp/port-forward.log 2>&1 &
        echo $!
      register: pfwd
      changed_when: true

    - name: Done
      debug:
        msg: "App running at http://localhost:{{ app_port }} (PID {{ pfwd.stdout }})"