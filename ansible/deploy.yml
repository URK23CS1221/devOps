---
- name: Deploy BlogApp to Minikube
  hosts: localhost
  connection: local

  environment:
    KUBECONFIG: "/home/dhp/.kube/config"
    PATH: "/usr/local/bin:/mnt/c/minikube:/mnt/c/Program Files/Docker/Docker/resources/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin"

  tasks:

    - name: Start Minikube
      command: minikube start
      changed_when: false
    - name: Update kubeconfig with current Minikube IP
      command: minikube update-context
      changed_when: false
      
    - name: Fix kubeconfig for WSL
      shell: |
        python3 -c "
        import re
        with open('/mnt/c/Users/DHARSHAN POWER/.kube/config', 'r') as f:
            c = f.read()
        c = re.sub(
            r'C:[/\\\\]+Users[/\\\\]+DHARSHAN POWER[/\\\\]+\.minikube([^\s]*)',
            lambda m: '/mnt/c/Users/DHARSHAN POWER/.minikube' + m.group(1).replace('\\\\', '/'),
            c
        )
        c = re.sub(r'(\.minikube[^\s]*)', lambda m: m.group(1).replace('\\\\', '/'), c)
        with open('/home/dhp/.kube/config', 'w') as f:
            f.write(c)
        print('kubeconfig fixed!')
        "
      changed_when: false

    - name: Load Docker image into Minikube
      command: minikube image load blogapp:latest
      changed_when: true

    - name: Apply deployment
      shell: kubectl apply --validate=false -f k8s/deployment.yaml
      args:
        chdir: "/mnt/c/Users/DHARSHAN POWER/Desktop/devOPs/devOps"
      register: deploy_out
      changed_when: "'created' in deploy_out.stdout or 'configured' in deploy_out.stdout"

    - name: Apply service
      shell: kubectl apply --validate=false -f k8s/service.yaml
      args:
        chdir: "/mnt/c/Users/DHARSHAN POWER/Desktop/devOPs/devOps"
      register: service_out
      changed_when: "'created' in service_out.stdout or 'configured' in service_out.stdout"

    - name: Wait for pods to be ready
      command: kubectl wait --for=condition=ready pod -l app=blogapp --timeout=120s
      changed_when: false

    - name: Show pod status
      command: kubectl get pods
      register: pod_status
      changed_when: false
    - debug:
        msg: "{{ pod_status.stdout_lines }}"

    - name: Show service status
      command: kubectl get services
      register: svc_status
      changed_when: false
    - debug:
        msg: "{{ svc_status.stdout_lines }}"

    - name: Port-forward in background
      shell: |
        nohup kubectl port-forward service/blogapp-service 8000:8000 \
        > /tmp/port-forward.log 2>&1 &
        echo $!
      changed_when: true

    - name: Done
      debug:
        msg: "✅ App running at http://localhost:8000"
