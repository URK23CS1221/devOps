{% extends 'blog/base.html' %}

{% block title %}Create New Post - DevOps Blog{% endblock %}

{% block content %}
<a href="{% url 'post_list' %}" class="back-link">← Back to all posts</a>

<h1>✏️ Create New Post</h1>

<div class="card">
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color: #ff6b6b; font-size: 0.85rem; margin-top: 0.3rem;">
                {{ field.errors.0 }}
            </p>
            {% endif %}
        </div>
        {% endfor %}
        <br>
        <button type="submit" class="btn">🚀 Publish Post</button>
    </form>
</div>
{% endblock %}
